<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hospital HQ - Executive Command Center</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 20px; color: #333; }
        .container { max-width: 1400px; margin: auto; }
        
        /* Admin Login Bar */
        .admin-bar { background: #343a40; color: white; padding: 15px 20px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid #007bff; }
        .admin-bar select { width: 250px; padding: 8px; background: #495057; color: white; border: 1px solid #666; border-radius: 4px; font-weight: bold; }

        /* Analytics Cards */
        .analytics-row { display: flex; gap: 15px; margin-bottom: 25px; }
        .stat-card { flex: 1; background: white; padding: 20px; border-radius: 12px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-top: 5px solid #007bff; }
        .stat-card h3 { margin: 0; font-size: 13px; color: #666; text-transform: uppercase; }
        .stat-card p { margin: 10px 0 0; font-size: 28px; font-weight: bold; }
        
        /* Buttons */
        .btn-group { margin-bottom: 20px; display: flex; gap: 10px; }
        .btn-report { background: #17a2b8; color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-download { background: #2c3e50; color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-report:hover, .btn-download:hover { opacity: 0.8; transform: translateY(-1px); }

        .section { background: white; padding: 25px; border-radius: 12px; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .flex-row { display: flex; gap: 20px; margin-bottom: 20px; }
        .card { flex: 1; padding: 20px; border: 1px solid #eee; border-radius: 10px; background: #fff; }
        
        input, select { width: 94%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; font-size: 14px; }
        th { background: #0056b3; color: white; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; }
        
        .status-expired { background: #f3e5f5 !important; color: #6a1b9a; font-weight: bold; }
        .status-low { background: #fff5f5 !important; color: #d9534f; font-weight: bold; }
        .badge { background: #e7f3ff; color: #007bff; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        .admin-tag { font-size: 12px; color: #555; font-weight: 600; background: #f8f9fa; padding: 2px 6px; border-radius: 4px; border: 1px solid #ddd; }

        .btn-add { background: #28a745; color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-view-all { background: #6c757d; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 12px; }
        
        .search-bar { background: #f8f9fa; border: 2px solid #007bff !important; width: 250px !important; margin: 0 !important; }

        #historyLog { list-style: none; padding: 0; max-height: 200px; overflow-y: auto; font-size: 13px; }
        #historyLog li { padding: 8px; border-bottom: 1px solid #ddd; border-left: 3px solid #007bff; background: #fff; margin-bottom: 4px; }
    </style>
</head>
<body>
<div class="container">
    
    <div class="admin-bar">
        <span>🏥 <strong>Kenya Health Management System</strong></span>
        <div>
            <span style="margin-right: 10px;">👤 Logged In:</span>
            <select id="currentAdmin">
                <option value="Joshua Omari">Joshua Omari (Chief Admin)</option>
                <option value="Lilian Nafula">Lilian Nafula (Records)</option>
                <option value="Zainab Hassan">Zainab Hassan (Pharmacy)</option>
            </select>
        </div>
    </div>

    <div class="btn-group">
        <button class="btn-report" onclick="showShiftSummary()">📋 Shift Activity Summary</button>
        <button class="btn-download" onclick="downloadInventoryReport()">📥 Download Pharmacy Report (CSV)</button>
    </div>

    <div class="analytics-row">
        <div class="stat-card"><h3>Staff Count</h3><p id="count-staff">0</p></div>
        <div class="stat-card"><h3>Total Stock</h3><p id="count-items">0</p></div>
        <div class="stat-card" style="border-top-color: #d9534f;"><h3>Low Stock</h3><p id="count-low" style="color:#d9534f">0</p></div>
        <div class="stat-card" style="border-top-color: #6a1b9a;"><h3>Outdated</h3><p id="count-outdated" style="color:#6a1b9a">0</p></div>
    </div>

    <div class="section">
        <div class="flex-row">
            <div class="card">
                <h3>Hire Staff</h3>
                <input type="text" id="s_id" placeholder="Staff ID">
                <input type="text" id="s_name" placeholder="Full Name">
                <input type="text" id="s_role" placeholder="Role">
                <select id="s_shift"><option value="Day">Day Shift</option><option value="Night">Night Shift</option></select>
                <button class="btn-add" onclick="addStaff()">Register Professional</button>
            </div>
            <div class="card">
                <h3>Inventory Log</h3>
                <input type="text" id="i_id" placeholder="Item ID"><input type="text" id="i_name" placeholder="Item Name">
                <input type="text" id="i_dept" placeholder="Department">
                <input type="number" id="i_qty" placeholder="Quantity"><input type="date" id="i_expiry">
                <button class="btn-add" onclick="addItem()">Save to Stock</button>
            </div>
        </div>
    </div>

    <div class="section">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <h2 style="margin:0;">Medical Staff List</h2>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="staffSearch" class="search-bar" placeholder="🔍 Search Staff..." onkeyup="filterTable('staffSearch', 'staffTable')">
                <button class="btn-view-all" onclick="resetSearch('staffSearch', 'staffTable')">View All</button>
            </div>
        </div>
        <table id="staffTable"></table>
    </div>

    <div class="section">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <h2 style="margin:0;">Pharmacy & Supply Tracking</h2>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="inventorySearch" class="search-bar" placeholder="🔍 Search Inventory..." onkeyup="filterTable('inventorySearch', 'inventoryTable')">
                <button class="btn-view-all" onclick="resetSearch('inventorySearch', 'inventoryTable')">View All</button>
            </div>
        </div>
        <table id="inventoryTable"></table>
    </div>

    <div class="section" style="background: #f8f9fa;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3>📜 Live Audit Log</h3>
            <input type="text" id="logFilter" placeholder="Filter log..." style="width: 200px; padding: 5px;" onkeyup="filterLogs()">
        </div>
        <ul id="historyLog"></ul>
    </div>
</div>

<script>
    const API = "http://localhost:8080";
    const HEADERS = { 'Content-Type': 'application/json', 'X-API-KEY': 'HospitalSecret123' };
    let fullHistory = [];
    let currentInventoryData = [];

    function getAdmin() { return document.getElementById('currentAdmin').value; }

    // --- 🔍 SEARCH & VIEW ALL LOGIC ---
    function filterTable(inputId, tableId) {
        const query = document.getElementById(inputId).value.toLowerCase();
        const rows = document.getElementById(tableId).getElementsByTagName('tr');
        for (let i = 1; i < rows.length; i++) {
            rows[i].style.display = rows[i].innerText.toLowerCase().includes(query) ? "" : "none";
        }
    }

    function resetSearch(inputId, tableId) {
        document.getElementById(inputId).value = "";
        const rows = document.getElementById(tableId).getElementsByTagName('tr');
        for (let i = 0; i < rows.length; i++) { rows[i].style.display = ""; }
    }

    // --- 📥 DOWNLOAD CSV REPORT ---
    function downloadInventoryReport() {
        if (currentInventoryData.length === 0) return alert("No inventory data to download.");
        
        let csvContent = "data:text/csv;charset=utf-8,";
        csvContent += "ID,Item Name,Department,Quantity,Expiry Date,Last Updated By,Status\n";

        currentInventoryData.forEach(item => {
            const today = new Date().toISOString().split('T')[0];
            let status = "OK";
            if (item.expiry_date && item.expiry_date < today) status = "EXPIRED";
            else if (item.quantity < 20) status = "LOW STOCK";

            const row = `${item.id},${item.name},${item.department},${item.quantity},${item.expiry_date || 'N/A'},${item.updated_by || 'System'},${status}`;
            csvContent += row + "\n";
        });

        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `Hospital_Inventory_Report_${new Date().toLocaleDateString()}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    // --- LOGGING & STAFF ---
    function logAction(action, user, item) {
        const time = new Date().toLocaleTimeString();
        fullHistory.unshift({ time, user, action, item, html: `<li><strong>[${time}]</strong> ${user} ${action}: <em>${item}</em></li>` });
        filterLogs();
    }

    function filterLogs() {
        const query = document.getElementById('logFilter').value.toLowerCase();
        document.getElementById('historyLog').innerHTML = fullHistory
            .filter(h => h.user.toLowerCase().includes(query) || h.item.toLowerCase().includes(query))
            .map(h => h.html).join('');
    }

    function showShiftSummary() {
        if (fullHistory.length === 0) return alert("No activity recorded this shift.");
        const counts = {};
        fullHistory.forEach(h => counts[h.user] = (counts[h.user] || 0) + 1);
        let report = "--- Shift Activity Summary ---\n\n";
        for (const [user, count] of Object.entries(counts)) { report += `👤 ${user}: ${count} actions recorded\n`; }
        alert(report);
    }

    // --- API CALLS ---
    async function addStaff() {
        const name = document.getElementById('s_name').value;
        const data = { id: document.getElementById('s_id').value, name, role: document.getElementById('s_role').value, shift: document.getElementById('s_shift').value, updated_by: getAdmin() };
        await fetch(`${API}/staff`, { method: 'POST', headers: HEADERS, body: JSON.stringify(data) });
        logAction("hired", getAdmin(), name);
        loadAll();
    }

    async function addItem() {
        const name = document.getElementById('i_name').value;
        const data = { id: document.getElementById('i_id').value, name, department: document.getElementById('i_dept').value, quantity: parseInt(document.getElementById('i_qty').value), expiry_date: document.getElementById('i_expiry').value, updated_by: getAdmin() };
        await fetch(`${API}/inventory`, { method: 'POST', headers: HEADERS, body: JSON.stringify(data) });
        logAction("stocked", getAdmin(), name);
        loadAll();
    }

    function renderStaff(data) {
        let html = `<thead><tr><th>ID</th><th>Name</th><th>Role</th><th>Shift</th><th>Employed On</th><th>Added By</th><th>Action</th></tr></thead><tbody>`;
        data.forEach(s => {
            html += `<tr><td>${s.id}</td><td><strong>${s.name}</strong></td><td><span class="badge">${s.role}</span></td><td>${s.shift}</td><td>${new Date(s.employed_on).toLocaleDateString()}</td><td><span class="admin-tag">${s.updated_by || 'System'}</span></td><td><button style="background:#dc3545; color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer;" onclick="deleteItem('staff','${s.id}')">Dismiss</button></td></tr>`;
        });
        document.getElementById('staffTable').innerHTML = html + "</tbody>";
        document.getElementById('count-staff').innerText = data.length;
    }

    function renderInventory(data) {
        currentInventoryData = data;
        const today = new Date().toISOString().split('T')[0];
        let low = 0, exp = 0;
        let html = `<thead><tr><th>ID</th><th>Item</th><th>📍 Dept</th><th>Qty</th><th>Expiry</th><th>By Admin</th><th>Status</th><th>Action</th></tr></thead><tbody>`;
        data.forEach(item => {
            const isLow = item.quantity < 20; if(isLow) low++;
            const isExp = item.expiry_date && item.expiry_date < today; if(isExp) exp++;
            html += `<tr class="${isExp ? 'status-expired' : (isLow ? 'status-low' : '')}">
                <td>${item.id}</td><td><strong>${item.name}</strong></td><td><span class="badge" style="background:#e3f2fd">${item.department}</span></td>
                <td>${item.quantity}</td><td>${item.expiry_date || 'N/A'}</td>
                <td><span class="admin-tag">${item.updated_by || 'System'}</span></td>
                <td>${isExp ? 'OUTDATED ⚠️' : (isLow ? 'LOW STOCK ⚠️' : 'OK ✅')}</td>
                <td><button style="background:#ffc107; border:none; padding:5px 10px; border-radius:4px; cursor:pointer; font-weight:bold;" onclick="refillItem('${item.id}','${item.name}',${item.quantity},'${item.department}','${item.expiry_date}')">Refill</button> <button style="background:#dc3545; color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer;" onclick="deleteItem('inventory','${item.id}')">Delete</button></td></tr>`;
        });
        document.getElementById('inventoryTable').innerHTML = html + "</tbody>";
        document.getElementById('count-items').innerText = data.length;
        document.getElementById('count-low').innerText = low;
        document.getElementById('count-outdated').innerText = exp;
    }

    async function refillItem(id, name, currentQty, dept, expiry) {
        const extra = prompt(`Refill ${name}. Quantity to add:`, "50");
        if (!extra) return;
        const data = { id, name, department: dept, quantity: parseInt(currentQty) + parseInt(extra), expiry_date: expiry, updated_by: getAdmin() };
        await fetch(`${API}/inventory`, { method: 'POST', headers: HEADERS, body: JSON.stringify(data) });
        logAction("refilled", getAdmin(), `${name} (+${extra})`);
        loadAll();
    }

    async function loadAll() {
        const s = await fetch(`${API}/staff`); renderStaff(await s.json());
        const i = await fetch(`${API}/inventory`); renderInventory(await i.json());
    }

    async function deleteItem(type, id) { if(confirm("Confirm?")) { 
        await fetch(`${API}/${type}/${id}`, { method: 'DELETE', headers: HEADERS }); 
        logAction("deleted", getAdmin(), `ID: ${id}`);
        loadAll(); 
    } }

    window.onload = loadAll;
</script>
</body>
</html>

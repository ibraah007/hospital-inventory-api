<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hospital HQ - Executive Command Center</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 20px; color: #333; }
        .container { max-width: 1400px; margin: auto; }
        .admin-bar { background: #343a40; color: white; padding: 15px 20px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid #007bff; }
        .analytics-row { display: flex; gap: 15px; margin-bottom: 25px; }
        .stat-card { flex: 1; background: white; padding: 20px; border-radius: 12px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-top: 5px solid #007bff; transition: 0.3s; }
        .stat-card h3 { margin: 0; font-size: 13px; color: #666; text-transform: uppercase; }
        .stat-card p { margin: 10px 0 0; font-size: 28px; font-weight: bold; }

        @keyframes pulse-alert {
            0% { box-shadow: 0 0 0 0px rgba(217, 83, 79, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(217, 83, 79, 0); }
            100% { box-shadow: 0 0 0 0px rgba(217, 83, 79, 0); }
        }
        .critical-flash { animation: pulse-alert 1.5s infinite; border: 2px solid #d9534f !important; }

        .section { background: white; padding: 25px; border-radius: 12px; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .flex-row { display: flex; gap: 20px; margin-bottom: 20px; }
        .card { flex: 1; padding: 20px; border: 1px solid #eee; border-radius: 10px; background: #fff; }
        input, select { width: 94%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; font-size: 14px; }
        th { background: #0056b3; color: white; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; }
        
        .status-expired { background: #f3e5f5 !important; color: #6a1b9a !important; font-weight: bold; }
        .status-low { background: #fff5f5 !important; color: #d9534f !important; font-weight: bold; }
        .badge { background: #e7f3ff; color: #007bff; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        .btn-add { background: #28a745; color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; cursor: pointer; font-weight: bold; }
        
        #reportDisplay { display:none; margin-top:20px; padding:20px; border:2px dashed #17a2b8; background:#f8fdff; border-radius:8px; }
        .report-grid { display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px; margin-top:15px; }

        #loginOverlay { position:fixed; top:0; left:0; width:100%; height:100%; background:#1a1a1a; z-index:9999; display:flex; justify-content:center; align-items:center; }
        @media print { .admin-bar, .section:not(#report-section), .btn-add, .badge { display: none !important; } #reportDisplay { display: block !important; border: none; } }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div style="background:white; padding:40px; border-radius:12px; width:350px; text-align:center;">
        <h2 style="color:#0056b3;">Hospital HQ Login</h2>
        <select id="userSelect">
            <option value="Joshua Omari|Chief Admin">Joshua Omari (Chief Admin)</option>
            <option value="Lilian Nafula|Records">Lilian Nafula (Records)</option>
            <option value="Zainab Hassan|Pharmacy">Zainab Hassan (Pharmacy)</option>
        </select>
        <input type="password" id="passCode" placeholder="Enter PIN (1234)">
        <button class="btn-add" onclick="handleLogin()">ACCESS SYSTEM</button>
    </div>
</div>

<div class="container" id="mainDashboard" style="display:none;">
    <div class="admin-bar">
        <span>🏥 <strong>Kenya Health Management System</strong></span>
        <div>
            <span id="roleTag" class="badge" style="background:#ffc107; color:#000; margin-right:10px;"></span>
            <span id="welcomeMsg" style="margin-right: 15px;"></span>
            <button onclick="handleLogout()" style="background:#dc3545; color:white; border:none; padding:8px 15px; border-radius:6px; font-weight:bold;">Logout</button>
        </div>
    </div>

    <div class="analytics-row">
        <div class="stat-card" id="card-staff"><h3>Staff Count</h3><p id="count-staff">0</p></div>
        <div class="stat-card" id="card-items"><h3>Total Stock</h3><p id="count-items">0</p></div>
        <div class="stat-card" id="card-low"><h3>Low Stock</h3><p id="count-low" style="color:#d9534f">0</p></div>
        <div class="stat-card" id="card-outdated"><h3>Outdated</h3><p id="count-outdated" style="color:#6a1b9a">0</p></div>
    </div>

    <div class="section" id="report-section" style="display:none; border-left: 10px solid #17a2b8;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>Management Reporting (Lilian Only)</h2>
            <button onclick="generateReport()" style="background:#17a2b8; color:white; padding:10px 20px; border:none; border-radius:6px; cursor:pointer; font-weight:bold;">📄 Generate Status Report</button>
        </div>
        <div id="reportDisplay"></div>
    </div>

    <div class="section">
        <div class="flex-row">
            <div class="card" id="staff-input-card">
                <h3>Hire Staff</h3>
                <input type="text" id="s_id" placeholder="Staff ID">
                <input type="text" id="s_name" placeholder="Full Name">
                <input type="text" id="s_role" placeholder="Role">
                <select id="s_shift"><option value="Day">Day Shift</option><option value="Night">Night Shift</option></select>
                <button class="btn-add" onclick="addStaff()">Register Professional</button>
            </div>
            <div class="card" id="inventory-input-card">
                <h3>Inventory Log</h3>
                <input type="text" id="i_id" placeholder="Item ID">
                <input type="text" id="i_name" placeholder="Item Name">
                <input type="number" id="i_qty" placeholder="Quantity">
                <input type="date" id="i_expiry">
                <button class="btn-add" onclick="addItem()">Save to Stock</button>
            </div>
        </div>
    </div>

    <div class="section" id="staff-list-section">
        <h2>Medical Staff List</h2>
        <table id="staffTable"></table>
    </div>

    <div class="section">
        <h2>Pharmacy & Supply Tracking</h2>
        <table id="inventoryTable"></table>
    </div>
</div>

<script>
    const API = "http://localhost:8080";
    
    function handleLogin() {
        const sel = document.getElementById('userSelect').value.split('|');
        if(document.getElementById('passCode').value === "1234") {
            sessionStorage.setItem("user", sel[0]);
            sessionStorage.setItem("role", sel[1]);
            checkSession();
        } else alert("Invalid PIN");
    }

    function handleLogout() { sessionStorage.clear(); location.reload(); }
    
    function checkSession() {
        const u = sessionStorage.getItem("user"), r = sessionStorage.getItem("role");
        if(u) {
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('mainDashboard').style.display = 'block';
            document.getElementById('welcomeMsg').innerText = `👤 ${u}`;
            document.getElementById('roleTag').innerText = r;
            applySecurity(r); 
            loadAll();
        }
    }

    function applySecurity(role) {
        document.getElementById('staff-input-card').style.display = role === "Pharmacy" ? 'none' : 'block';
        document.getElementById('staff-list-section').style.display = role === "Pharmacy" ? 'none' : 'block';
        document.getElementById('inventory-input-card').style.display = role === "Records" ? 'none' : 'block';
        
        // 🛡️ Lilian's Exclusive Reporting Tool
        document.getElementById('report-section').style.display = role === "Records" ? 'block' : 'none';
    }

    const getHeaders = () => ({ 'Content-Type': 'application/json', 'X-API-KEY': 'HospitalSecret123' });

    async function addStaff() {
        const id = document.getElementById('s_id').value.trim(), name = document.getElementById('s_name').value.trim();
        if(!id || !name) return alert("❌ Staff ID and Name are required!");
        const body = { id, name, role: document.getElementById('s_role').value, shift: document.getElementById('s_shift').value };
        const res = await fetch(`${API}/staff`, { method: 'POST', headers: getHeaders(), body: JSON.stringify(body) });
        if(res.ok) { alert("✅ Staff Registered!"); document.getElementById('s_id').value = ""; document.getElementById('s_name').value = ""; loadAll(); }
    }

    async function addItem() {
        const id = document.getElementById('i_id').value.trim(), name = document.getElementById('i_name').value.trim(), qty = document.getElementById('i_qty').value;
        if(!id || !name || !qty) return alert("❌ ID, Name, and Qty are required!");
        const body = { id, name, quantity: parseInt(qty), expiry_date: document.getElementById('i_expiry').value };
        const res = await fetch(`${API}/inventory`, { method: 'POST', headers: getHeaders(), body: JSON.stringify(body) });
        if(res.ok) { alert("✅ Stock Saved!"); document.getElementById('i_id').value = ""; document.getElementById('i_name').value = ""; document.getElementById('i_qty').value = ""; loadAll(); }
    }

    async function loadAll() {
        try {
            const s = await fetch(`${API}/staff`, { headers: getHeaders() });
            const i = await fetch(`${API}/inventory`, { headers: getHeaders() });
            if(s.ok) renderStaff(await s.json());
            if(i.ok) renderInventory(await i.json());
        } catch(e) { console.log("Backend offline"); }
    }

    function renderStaff(data) {
        const role = sessionStorage.getItem("role");
        let validRows = 0;
        let h = `<thead><tr><th>ID</th><th>Name</th><th>Role</th><th>Shift</th><th>Action</th></tr></thead><tbody>`;
        data.forEach(x => {
            if(!x.id || !x.name) return;
            validRows++;
            h += `<tr><td>${x.id}</td><td><strong>${x.name}</strong></td><td>${x.role}</td><td>${x.shift}</td><td>`;
            if (role === "Chief Admin") h += `<button onclick="deleteRow('staff','${x.id}')" style="background:#dc3545; color:white; border:none; padding:4px 8px; border-radius:4px; cursor:pointer;">Dismiss</button>`;
            else h += `<small>Restricted</small>`;
            h += `</td></tr>`;
        });
        document.getElementById('staffTable').innerHTML = h;
        document.getElementById('count-staff').innerText = validRows;
    }

    function renderInventory(data) {
        const role = sessionStorage.getItem("role"), today = new Date().toISOString().split('T')[0];
        let low = 0, outdated = 0, visibleCount = 0;
        let h = `<thead><tr><th>ID</th><th>Item</th><th>Qty</th><th>Expiry</th><th>Status</th><th>Action</th></tr></thead><tbody>`;
        data.forEach(x => {
            if(!x.id || !x.name) return;
            visibleCount++;
            const isL = x.quantity < 20, isE = x.expiry_date && x.expiry_date < today;
            if(isL) low++; if(isE) outdated++;
            h += `<tr class="${isE ? 'status-expired' : (isL ? 'status-low' : '')}"><td>${x.id}</td><td><strong>${x.name}</strong></td><td>${x.quantity}</td><td>${x.expiry_date || 'N/A'}</td><td>${isE ? 'OUTDATED' : (isL ? 'LOW' : 'OK')}</td><td>`;
            if (role === "Chief Admin") h += `<button onclick="deleteRow('inventory','${x.id}')" style="background:#dc3545; color:white; border:none; padding:4px 8px; border-radius:4px; cursor:pointer;">Delete</button>`;
            else h += `<small>Restricted</small>`;
            h += `</td></tr>`;
        });
        document.getElementById('inventoryTable').innerHTML = h;
        document.getElementById('count-items').innerText = visibleCount;
        document.getElementById('count-low').innerText = low;
        document.getElementById('count-outdated').innerText = outdated;
        document.getElementById('card-low').classList.toggle('critical-flash', low > 0);
        document.getElementById('card-outdated').classList.toggle('critical-flash', outdated > 0);
        
        // 🔔 AUTO-ALERT FOR CRITICAL STOCK
        if(low > 0 && (role === "Chief Admin" || role === "Records")) {
            console.log("System Alert: Low Stock Detected");
        }
    }

    async function deleteRow(t, id) {
        if(confirm("Confirm Delete?")) { await fetch(`${API}/${t}/${id}`, { method: 'DELETE', headers: getHeaders() }); loadAll(); }
    }

    function generateReport() {
        const reportBox = document.getElementById('reportDisplay');
        reportBox.style.display = "block";
        const timestamp = new Date().toLocaleString();
        const u = sessionStorage.getItem("user");
        
        reportBox.innerHTML = `
            <div style="text-align:center; border-bottom: 2px solid #333; padding-bottom:10px; margin-bottom:20px;">
                <h2 style="margin:0;">KENYA HEALTH MANAGEMENT SYSTEM</h2>
                <h3 style="margin:5px 0; color:#0056b3;">Official Executive Summary</h3>
            </div>
            <p><strong>Prepared By:</strong> ${u}</p>
            <p><strong>Report Date:</strong> ${timestamp}</p>
            <div class="report-grid">
                <div style="padding:15px; border:1px solid #ddd; border-radius:6px;">
                    <strong>Staff Count:</strong> ${document.getElementById('count-staff').innerText}
                </div>
                <div style="padding:15px; border:1px solid #d9534f; border-radius:6px; color:#d9534f;">
                    <strong>Stock Alerts:</strong> ${document.getElementById('count-low').innerText} Items Low
                </div>
                <div style="padding:15px; border:1px solid #6a1b9a; border-radius:6px; color:#6a1b9a;">
                    <strong>Safety Risk:</strong> ${document.getElementById('count-outdated').innerText} Items Expired
                </div>
            </div>
            <button onclick="window.print()" style="margin-top:20px; background:#343a40; color:white; border:none; padding:8px 15px; border-radius:6px; cursor:pointer; font-weight:bold;">🖨️ Print for Management</button>
        `;
        reportBox.scrollIntoView({ behavior: 'smooth' });
    }

    window.onload = checkSession;
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hospital HQ - Executive Command Center</title>
    <style>
        /* [MAINTAINING YOUR ORIGINAL CSS 100%] */
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 20px; color: #333; }
        .container { max-width: 1400px; margin: auto; }
        .admin-bar { background: #343a40; color: white; padding: 15px 20px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid #007bff; }
        
        .analytics-row { display: flex; gap: 15px; margin-bottom: 25px; }
        .stat-card { flex: 1; background: white; padding: 20px; border-radius: 12px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-top: 5px solid #007bff; transition: 0.3s; }
        .stat-card h3 { margin: 0; font-size: 13px; color: #666; text-transform: uppercase; }
        .stat-card p { margin: 10px 0 0; font-size: 28px; font-weight: bold; }

        /* ✨ NEW: FLASHING ANIMATION FOR ALERTS */
        @keyframes pulse-alert {
            0% { box-shadow: 0 0 0 0px rgba(217, 83, 79, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(217, 83, 79, 0); }
            100% { box-shadow: 0 0 0 0px rgba(217, 83, 79, 0); }
        }
        .critical-flash { animation: pulse-alert 1.5s infinite; border: 2px solid #d9534f !important; }

        .btn-group { margin-bottom: 20px; display: flex; gap: 10px; }
        .btn-report { background: #17a2b8; color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-download { background: #2c3e50; color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        
        .section { background: white; padding: 25px; border-radius: 12px; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .flex-row { display: flex; gap: 20px; margin-bottom: 20px; }
        .card { flex: 1; padding: 20px; border: 1px solid #eee; border-radius: 10px; background: #fff; }
        
        input, select { width: 94%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; font-size: 14px; }
        th { background: #0056b3; color: white; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; }
        
        /* ALERT ROW COLORS */
        .status-expired { background: #f3e5f5 !important; color: #6a1b9a !important; font-weight: bold; }
        .status-low { background: #fff5f5 !important; color: #d9534f !important; font-weight: bold; }
        
        .badge { background: #e7f3ff; color: #007bff; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        .btn-add { background: #28a745; color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-view-all { background: #6c757d; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 12px; }
        .search-bar { background: #f8f9fa; border: 2px solid #007bff !important; width: 250px !important; margin: 0 !important; }
        
        #loginOverlay { position:fixed; top:0; left:0; width:100%; height:100%; background:#1a1a1a; z-index:9999; display:flex; justify-content:center; align-items:center; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div style="background:white; padding:40px; border-radius:12px; width:350px; text-align:center;">
        <h2 style="color:#0056b3;">Hospital HQ Login</h2>
        <select id="userSelect">
            <option value="Joshua Omari|Chief Admin">Joshua Omari (Chief Admin)</option>
            <option value="Lilian Nafula|Records">Lilian Nafula (Records)</option>
            <option value="Zainab Hassan|Pharmacy">Zainab Hassan (Pharmacy)</option>
        </select>
        <input type="password" id="passCode" placeholder="Enter PIN (1234)">
        <button class="btn-add" onclick="handleLogin()">ACCESS SYSTEM</button>
    </div>
</div>

<div class="container" id="mainDashboard" style="display:none;">
    <div class="admin-bar">
        <span>🏥 <strong>Kenya Health Management System</strong></span>
        <div>
            <span id="welcomeMsg" style="margin-right: 15px;"></span>
            <button onclick="handleLogout()" style="background:#dc3545; color:white; border:none; padding:8px 15px; border-radius:6px; font-weight:bold;">Logout</button>
        </div>
    </div>

    <div class="analytics-row">
        <div class="stat-card" id="card-staff"><h3>Staff Count</h3><p id="count-staff">0</p></div>
        <div class="stat-card" id="card-items"><h3>Total Stock</h3><p id="count-items">0</p></div>
        <div class="stat-card" id="card-low" style="border-top-color: #d9534f;"><h3>Low Stock</h3><p id="count-low" style="color:#d9534f">0</p></div>
        <div class="stat-card" id="card-outdated" style="border-top-color: #6a1b9a;"><h3>Outdated</h3><p id="count-outdated" style="color:#6a1b9a">0</p></div>
    </div>

    <div class="section">
        <div class="flex-row">
            <div class="card">
                <h3>Hire Staff</h3>
                <input type="text" id="s_id" placeholder="Staff ID">
                <input type="text" id="s_name" placeholder="Full Name">
                <input type="text" id="s_role" placeholder="Role">
                <select id="s_shift"><option value="Day">Day Shift</option><option value="Night">Night Shift</option></select>
                <button class="btn-add" onclick="addStaff()">Register Professional</button>
            </div>
            <div class="card">
                <h3>Inventory Log</h3>
                <input type="text" id="i_id" placeholder="Item ID">
                <input type="text" id="i_name" placeholder="Item Name">
                <input type="text" id="i_dept" placeholder="Department">
                <input type="number" id="i_qty" placeholder="Quantity">
                <input type="date" id="i_expiry">
                <button class="btn-add" onclick="addItem()">Save to Stock</button>
            </div>
        </div>
    </div>

    <div class="section">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <h2>Medical Staff List</h2>
            <div>
                <input type="text" id="staffSearch" class="search-bar" placeholder="🔍 Search Staff..." onkeyup="filterTable('staffSearch', 'staffTable')">
                <button class="btn-view-all" onclick="resetSearch('staffSearch', 'staffTable')">View All</button>
            </div>
        </div>
        <table id="staffTable"></table>
    </div>

    <div class="section">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <h2>Pharmacy & Supply Tracking</h2>
            <div>
                <input type="text" id="inventorySearch" class="search-bar" placeholder="🔍 Search Inventory..." onkeyup="filterTable('inventorySearch', 'inventoryTable')">
                <button class="btn-view-all" onclick="resetSearch('inventorySearch', 'inventoryTable')">View All</button>
            </div>
        </div>
        <table id="inventoryTable"></table>
    </div>
</div>

<script>
    const API = "http://localhost:8080";
    
    // --- AUTHENTICATION ---
    function handleLogin() {
        const sel = document.getElementById('userSelect').value.split('|');
        if(document.getElementById('passCode').value === "1234") {
            sessionStorage.setItem("user", sel[0]);
            sessionStorage.setItem("role", sel[1]);
            checkSession();
        } else alert("Invalid PIN");
    }
    function handleLogout() { sessionStorage.clear(); location.reload(); }
    function checkSession() {
        const u = sessionStorage.getItem("user");
        if(u) {
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('mainDashboard').style.display = 'block';
            document.getElementById('welcomeMsg').innerText = `👤 ${u}`;
            loadAll();
        }
    }

    const getHeaders = () => ({ 
        'Content-Type': 'application/json', 
        'X-API-KEY': 'HospitalSecret123'
    });

    // --- ACTIONS ---
    async function addStaff() {
        const body = {
            id: document.getElementById('s_id').value,
            name: document.getElementById('s_name').value,
            role: document.getElementById('s_role').value,
            shift: document.getElementById('s_shift').value
        };
        if(!body.id || !body.name) return alert("Fill ID and Name");
        const res = await fetch(`${API}/staff`, { method: 'POST', headers: getHeaders(), body: JSON.stringify(body) });
        if(res.ok) { alert("Staff Registered!"); loadAll(); }
    }

    async function addItem() {
        const body = {
            id: document.getElementById('i_id').value,
            name: document.getElementById('i_name').value,
            department: document.getElementById('i_dept').value,
            quantity: parseInt(document.getElementById('i_qty').value) || 0,
            expiry_date: document.getElementById('i_expiry').value
        };
        if(!body.id || !body.name) return alert("Fill Item ID and Name");
        const res = await fetch(`${API}/inventory`, { method: 'POST', headers: getHeaders(), body: JSON.stringify(body) });
        if(res.ok) { alert("Stock Saved!"); loadAll(); }
    }

    // --- LOAD ALL DATA ---
    async function loadAll() {
        try {
            const s = await fetch(`${API}/staff`, { headers: getHeaders() });
            const i = await fetch(`${API}/inventory`, { headers: getHeaders() });
            if(s.ok) renderStaff(await s.json());
            if(i.ok) renderInventory(await i.json());
        } catch(e) { console.log("Backend offline."); }
    }

    function renderStaff(data) {
        let h = `<thead><tr><th>ID</th><th>Name</th><th>Role</th><th>Shift</th><th>Action</th></tr></thead><tbody>`;
        data.forEach(x => {
            h += `<tr><td>${x.id}</td><td><strong>${x.name}</strong></td><td><span class="badge">${x.role}</span></td><td>${x.shift}</td><td><button onclick="deleteRow('staff','${x.id}')" style="background:#dc3545; color:white; border:none; padding:4px 8px; border-radius:4px; cursor:pointer;">Dismiss</button></td></tr>`;
        });
        document.getElementById('staffTable').innerHTML = h + `</tbody>`;
        document.getElementById('count-staff').innerText = data.length;
    }

    function renderInventory(data) {
        const today = new Date().toISOString().split('T')[0];
        let low = 0, outdated = 0;

        let h = `<thead><tr><th>ID</th><th>Item</th><th>Dept</th><th>Qty</th><th>Expiry</th><th>Status</th><th>Action</th></tr></thead><tbody>`;
        
        data.forEach(x => {
            const isLow = parseInt(x.quantity) < 20;
            const isExp = x.expiry_date && x.expiry_date < today;
            if(isLow) low++;
            if(isExp) outdated++;

            let rowClass = isExp ? "status-expired" : (isLow ? "status-low" : "");
            let statusText = isExp ? "OUTDATED ⚠️" : (isLow ? "LOW STOCK ⚠️" : "OK ✅");

            h += `<tr class="${rowClass}">
                <td>${x.id}</td>
                <td><strong>${x.name}</strong></td>
                <td><span class="badge" style="background:#e3f2fd">${x.department}</span></td>
                <td>${x.quantity}</td>
                <td>${x.expiry_date || 'N/A'}</td>
                <td>${statusText}</td>
                <td><button onclick="deleteRow('inventory','${x.id}')" style="background:#dc3545; color:white; border:none; padding:4px 8px; border-radius:4px; cursor:pointer;">Delete</button></td>
            </tr>`;
        });
        
        document.getElementById('inventoryTable').innerHTML = h + `</tbody>`;
        document.getElementById('count-items').innerText = data.length;
        document.getElementById('count-low').innerText = low;
        document.getElementById('count-outdated').innerText = outdated;

        // Apply Flashing Animation to Cards
        document.getElementById('card-low').classList.toggle('critical-flash', low > 0);
        document.getElementById('card-outdated').classList.toggle('critical-flash', outdated > 0);
    }

    async function deleteRow(type, id) {
        if(confirm("Permanently delete?")) {
            await fetch(`${API}/${type}/${id}`, { method: 'DELETE', headers: getHeaders() });
            loadAll();
        }
    }

    // --- SEARCH ---
    function filterTable(inputId, tableId) {
        const q = document.getElementById(inputId).value.toLowerCase();
        const rows = document.getElementById(tableId).getElementsByTagName('tr');
        for (let i = 1; i < rows.length; i++) {
            rows[i].style.display = rows[i].innerText.toLowerCase().includes(q) ? "" : "none";
        }
    }
    function resetSearch(inputId, tableId) {
        document.getElementById(inputId).value = "";
        filterTable(inputId, tableId);
    }

    window.onload = checkSession;
</script>
</body>
</html>
